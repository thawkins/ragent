# cargo-deny configuration for ragent.
# See https://embarkstudios.github.io/cargo-deny/ for full documentation.
# Schema updated for cargo-deny >=0.19 (older keys like vulnerability/unmaintained removed).

[advisories]
# Ignore advisories for vulnerabilities in transitive deps we cannot directly control.
ignore = [
    # RUSTSEC-2026-0002: lru IterMut violates Stacked Borrows.
    # lru is a transitive dependency of ratatui 0.29; we do not call iter_mut() directly.
    { id = "RUSTSEC-2026-0002", reason = "transitive via ratatui; ragent does not call lru::LruCache::iter_mut()" },
    # RUSTSEC-2024-0436: paste crate no longer maintained.
    # paste is a transitive dep (via ratatui); it continues to work correctly.
    { id = "RUSTSEC-2024-0436", reason = "transitive via ratatui; functionality unaffected" },
    # RUSTSEC-2024-0370: proc-macro-error is unmaintained.
    # proc-macro-error is a transitive dep (via ouroboros -> allsorts -> printpdf).
    { id = "RUSTSEC-2024-0370", reason = "transitive via printpdf; functionality unaffected" },
]

[licenses]
# Only allow these license families.
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "BSL-1.0",
    "CC0-1.0",
    "OpenSSL",
    "MPL-2.0",
    # webpki-roots uses CDLA-Permissive-2.0 (Community Data License Agreement — permissive).
    "CDLA-Permissive-2.0",
]

# ring uses a custom ISC-style license.
[[licenses.clarify]]
name = "ring"
expression = "ISC AND MIT AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
# Warn on multiple versions of the same crate (common in large trees).
multiple-versions = "warn"
# Warn on wildcard deps (workspace-internal path deps are flagged here; deny for external wildcards
# is enforced by convention rather than this setting to avoid false-positives on workspace members).
wildcards = "warn"

[sources]
# Only allow crates from crates.io and local paths.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
