[workspace]
members = ["crates/*"]
resolver = "2"

[workspace.package]
version = "0.1.0-alpha.47"
edition = "2024"
license = "MIT"
repository = "https://github.com/thawkins/ragent"
authors = ["Tim Hawkins <tim.thawkins@gmail.com>"]

[package]
name = "ragent"
version.workspace = true
edition.workspace = true
license.workspace = true

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Workspace Lints
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

[workspace.lints.rust]
missing_docs = "warn"
unsafe_code = "deny"

[workspace.lints.clippy]
# Lint groups (higher priority)
all = { level = "warn", priority = -2 }
pedantic = { level = "warn", priority = -1 }
nursery = { level = "warn", priority = -1 }

# Architecture-level suppressions
too_many_lines = "allow"
too_many_arguments = "allow"
struct_excessive_bools = "allow"
type_complexity = "allow"
similar_names = "allow"

# Numeric casts (intentional for geometry/layout/token counts)
cast_possible_truncation = "allow"
cast_precision_loss = "allow"
cast_sign_loss = "allow"
cast_possible_wrap = "allow"

# Documentation style (enforced by review)
missing_errors_doc = "allow"
missing_panics_doc = "allow"
too_long_first_doc_paragraph = "allow"
doc_markdown = "allow"
empty_line_after_doc_comments = "allow"

# Code style suppressions (low-risk, auto-fixable)
assigning_clones = "allow"
bool_to_int_with_if = "allow"
branches_sharing_code = "allow"
cast_lossless = "allow"
clone_on_copy = "allow"
collapsible_else_if = "allow"
collapsible_if = "allow"
collection_is_never_read = "allow"
comparison_chain = "allow"
default_trait_access = "allow"
double_must_use = "allow"
equatable_if_let = "allow"
explicit_iter_loop = "allow"
format_collect = "allow"
format_push_string = "allow"
if_not_else = "allow"
if_same_then_else = "allow"
ignored_unit_patterns = "allow"
implicit_clone = "allow"
items_after_statements = "allow"
manual_clamp = "allow"
manual_let_else = "allow"
manual_strip = "allow"
manual_unwrap_or = "allow"
manual_unwrap_or_default = "allow"
map_unwrap_or = "allow"
match_same_arms = "allow"
match_wildcard_for_single_variants = "allow"
missing_const_for_fn = "allow"
missing_fields_in_debug = "allow"
must_use_candidate = "allow"
needless_borrow = "allow"
needless_continue = "allow"
needless_pass_by_ref_mut = "allow"
needless_pass_by_value = "allow"
needless_range_loop = "allow"
new_without_default = "allow"
no_effect_underscore_binding = "allow"
option_if_let_else = "allow"
or_fun_call = "allow"
ptr_arg = "allow"
redundant_clone = "allow"
redundant_closure_for_method_calls = "allow"
redundant_else = "allow"
ref_option = "allow"
semicolon_if_nothing_returned = "allow"
should_implement_trait = "allow"
significant_drop_tightening = "allow"
single_char_add_str = "allow"
single_match = "allow"
single_match_else = "allow"
trivially_copy_pass_by_ref = "allow"
uninlined_format_args = "allow"
unnecessary_map_or = "allow"
unnecessary_sort_by = "allow"
unnecessary_unwrap = "allow"
unnecessary_wraps = "allow"
unnested_or_patterns = "allow"
unused_async = "allow"
unused_peekable = "allow"
unused_self = "allow"
unwrap_used = "allow"
useless_format = "allow"
useless_let_if_seq = "allow"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Workspace Dependencies
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

[workspace.dependencies]
# Internal crates
ragent-agent = { path = "crates/ragent-agent" }
ragent-server = { path = "crates/ragent-server" }
ragent-tui = { path = "crates/ragent-tui" }

# Async runtime (full feature set for fs, net, process, signal, rt-multi-thread)
async-stream = "0.3"
async-trait = "0.1"
bytes = "1"
futures = "0.3"
pin-project-lite = "0.2"
tokio = { version = "1", features = ["full"] }
tokio-stream = { version = "0.1", features = ["sync"] }

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"

# Error handling
anyhow = "1"
thiserror = "2"

# Logging and tracing
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }

# Identity and time
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1", features = ["v4"] }

# HTTP client (rustls-tls for pure-Rust, auditable TLS)
reqwest = { version = "0.12", features = ["json", "stream", "rustls-tls"], default-features = false }

# Database (bundled SQLite — no system dependency)
rusqlite = { version = "0.32", features = ["bundled"] }

# CLI
clap = { version = "4", features = ["derive"] }

# Web framework
axum = { version = "0.8", features = ["macros"] }
axum-extra = { version = "0.10", features = ["typed-header"] }
tower = "0.5"
tower-http = { version = "0.6", features = ["cors", "trace"] }

# TUI
crossterm = "0.28"
ratatui = { version = "0.29", features = ["unstable-rendered-line-info"] }

# File, path, and text processing
base64 = "0.22"
dirs = "6"
glob = "0.3"
globset = "0.4"
html2text = "0.16"
rand = "0.9"
regex = "1"
similar = "2"

# ripgrep library crates
grep-regex = "0.1"
grep-searcher = "0.1"
ignore = "0.4"

# Clipboard and image (PNG only)
arboard = "3"
image = { version = "0.25", default-features = false, features = ["png"] }

# Hardware/IPMI
rmcp = { version = "0.16", features = ["client", "transport-child-process", "transport-streamable-http-client-reqwest"] }

# Document formats
calamine = "0.34"
docx-rust = "0.1"
lopdf = "0.39"
ooxmlsdk = "0.3"
pdf-extract = "0.10"
printpdf = { version = "0.9", default-features = false, features = ["text_layout", "png", "jpeg"] }
quick-xml = { version = "0.39", features = ["serialize"] }
rust_xlsxwriter = "0.94"
spreadsheet-ods = "1.0"
zip = { version = "7", default-features = false, features = ["deflate"] }

# LSP client
lsp-types = "0.97"
url = "2"

# Concurrent collections and parallelism
dashmap = "6"
lru = "0.12"
rayon = "1"

# Hashing and file locking
blake3 = "1.4"
fs2 = "0.4"
num_cpus = "1.16"
sha2 = "0.10"

# Encoding
hex = "0.4"

# Benchmarking
criterion = { version = "0.5", features = ["html_reports"] }

# Embeddings (optional, feature-gated)
ndarray = "0.17"
ort = { version = "2.0.0-rc.12", features = ["download-binaries", "load-dynamic"] }
tokenizers = { version = "0.21", features = ["onig"] }

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Binary Configuration
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

[[bin]]
name = "ragent"
path = "src/main.rs"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Root Package Dependencies
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

[dependencies]
ragent-agent = { workspace = true }
ragent-server = { workspace = true }
ragent-tui = { workspace = true }
anyhow = { workspace = true }
clap = { workspace = true }
dirs = { workspace = true }
futures = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
uuid = { workspace = true }

[lints]
workspace = true

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Release Profile (optimized for size and performance)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

[profile.release]
lto = true            # Link-time optimization
codegen-units = 1     # Single codegen unit for better optimization
strip = true          # Strip symbols for smaller binary
opt-level = "z"       # Optimize for size
